name: Java Maven CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build code
        run: mvn clean compile

      - name: Test code
        run: mvn test